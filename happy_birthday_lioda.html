<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Lioda! 🎉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      font-family: 'Georgia', serif;
      text-align: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 3rem 4rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      max-width: 500px;
    }

    .emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.5rem;
      color: #e05c8a;
      margin-bottom: 0.5rem;
    }

    .name {
      font-size: 3rem;
      color: #f6a623;
      font-style: italic;
      margin-bottom: 1.5rem;
    }

    p {
      font-size: 1.1rem;
      color: #666;
      line-height: 1.7;
    }

    .footer-emoji {
      font-size: 2rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎂</div>
    <h1>Happy Birthday</h1>
    <div class="name">Lioda!</div>
    <p>Wishing you a wonderful day filled with joy, laughter, and all the things you love. 🎉</p>
    <div class="footer-emoji">🥳 🎈 🎁</div>
  </div>
</body>
</html>
