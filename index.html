<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Happy Birthday Lioda!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a2e;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Press Start 2P', monospace;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H, scale;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  W = canvas.width;
  H = canvas.height;
  scale = Math.min(W / 360, H / 640);
}
resize();
window.addEventListener('resize', resize);

// --- COLORS ---
const COL = {
  sky: ['#0a0a2e','#141452','#1e1e6e'],
  stars: '#ffffff',
  neon: ['#ff00ff','#00ffff','#ff3366','#ffff00','#00ff99'],
  building: ['#0d0d3b','#111148','#161655','#1a1a62'],
  window: ['#ffff66','#ff9933','#66ffff','#ff66ff'],
  skin: '#c68642',
  hair: '#1a1a1a',
  jacket: '#111111',
  jacketHL: '#222222',
  shirt: '#ff3366',
  pants: '#222244',
  shoes: '#111111',
  minion: '#ffe135',
  minionEye: '#ffffff',
  minionPupil: '#3b2507',
  minionGoggles: '#888888',
  minionPants: '#4169e1',
};

// --- STARS ---
const stars = Array.from({length: 80}, () => ({
  x: Math.random(), y: Math.random() * 0.4, s: Math.random() * 2 + 1, b: Math.random()
}));

// (buildings removed — disco venue now)

// --- DISCO FLOOR TILES ---
const discoTiles = [];
const tileRows = 8, tileCols = 10;
for (let r = 0; r < tileRows; r++) {
  for (let c = 0; c < tileCols; c++) {
    discoTiles.push({
      r, c,
      color: COL.neon[Math.floor(Math.random() * COL.neon.length)],
      phase: Math.random() * Math.PI * 2
    });
  }
}

// --- CONFETTI ---
const confetti = Array.from({length: 60}, () => ({
  x: Math.random(), y: Math.random(), vx: (Math.random()-0.5)*0.002,
  vy: Math.random()*0.003+0.001, size: Math.random()*4+2,
  color: COL.neon[Math.floor(Math.random()*COL.neon.length)],
  rot: Math.random() * Math.PI * 2, rotV: (Math.random()-0.5)*0.1
}));

// --- GIRL CHARACTER ---
const girl = {
  x: 0.5, y: 0.72,
  dance: -1,
  danceFrame: 0,
  danceTimer: 0,
  danceDuration: 120,
  bounceT: 0
};

// --- MINIONS ---
const minions = [
  { x: 0.12, y: 0.78, dir: 1, jumpT: 0 },
  { x: 0.28, y: 0.80, dir: 1, jumpT: 30 },
  { x: 0.72, y: 0.80, dir: -1, jumpT: 15 },
  { x: 0.88, y: 0.78, dir: -1, jumpT: 45 },
];

// --- SPEECH BUBBLES ---
const speeches = [
  "HAPPY BIRTHDAY!",
  "BELLO!",
  "PARA TU!",
  "BANANA!",
];

let titleGlow = 0;
let frameCount = 0;

// --- TOUCH HANDLING ---
canvas.addEventListener('click', handleTap);
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  handleTap({ clientX: t.clientX, clientY: t.clientY });
}, { passive: false });

function handleTap(e) {
  const gx = girl.x * W;
  const gy = girl.y * H;
  const dx = e.clientX - gx;
  const dy = e.clientY - gy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 70 * scale) {
    // Pick a random dance different from the current one
    let next;
    do { next = Math.floor(Math.random() * 5); } while (next === girl.dance);
    girl.dance = next;
    girl.danceFrame = 0;
    girl.danceTimer = 0;
  }
}

// --- DRAW HELPERS ---
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.6);
  grad.addColorStop(0, COL.sky[0]);
  grad.addColorStop(0.5, COL.sky[1]);
  grad.addColorStop(1, COL.sky[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  stars.forEach(s => {
    const twinkle = Math.sin(frameCount * 0.05 + s.b * 10) * 0.5 + 0.5;
    ctx.globalAlpha = twinkle * 0.8 + 0.2;
    ctx.fillStyle = COL.stars;
    const sz = s.s * scale;
    const sx = s.x * W, sy = s.y * H;
    ctx.fillRect(sx, sy - sz, sz, sz);
    ctx.fillRect(sx - sz, sy, sz, sz);
    ctx.fillRect(sx, sy, sz, sz);
    ctx.fillRect(sx + sz, sy, sz, sz);
    ctx.fillRect(sx, sy + sz, sz, sz);
  });
  ctx.globalAlpha = 1;
}

function drawDiscoBall() {
  const bx = W * 0.5;
  const by = H * 0.18;
  const r = 18 * scale;

  // String
  ctx.strokeStyle = '#888888';
  ctx.lineWidth = 2 * scale;
  ctx.beginPath();
  ctx.moveTo(bx, 0);
  ctx.lineTo(bx, by - r);
  ctx.stroke();

  // Ball base
  const grad = ctx.createRadialGradient(bx - r*0.3, by - r*0.3, r*0.1, bx, by, r);
  grad.addColorStop(0, '#dddddd');
  grad.addColorStop(0.5, '#999999');
  grad.addColorStop(1, '#444444');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI * 2);
  ctx.fill();

  // Mirror facets
  for (let row = -3; row <= 3; row++) {
    for (let col = -4; col <= 4; col++) {
      const angle = col * 0.35 + frameCount * 0.02;
      const yOff = row * r * 0.22;
      const xOff = Math.cos(angle) * r * 0.7 * Math.cos(yOff / r);
      const fx = bx + xOff;
      const fy = by + yOff;
      const distSq = (fx - bx) * (fx - bx) + (fy - by) * (fy - by);
      if (distSq < r * r * 0.85) {
        const flash = Math.sin(frameCount * 0.08 + row + col * 2) * 0.5 + 0.5;
        ctx.fillStyle = `rgba(255,255,255,${flash * 0.7})`;
        ctx.fillRect(fx - 2*scale, fy - 2*scale, 4*scale, 3*scale);
      }
    }
  }

  // Light rays from disco ball
  for (let i = 0; i < 8; i++) {
    const a = frameCount * 0.03 + i * Math.PI / 4;
    const rayLen = 80 * scale + Math.sin(frameCount * 0.05 + i) * 30 * scale;
    const rx = bx + Math.cos(a) * rayLen;
    const ry = by + Math.sin(a) * rayLen;
    ctx.strokeStyle = COL.neon[i % COL.neon.length];
    ctx.globalAlpha = 0.15 + Math.sin(frameCount * 0.06 + i) * 0.1;
    ctx.lineWidth = 2 * scale;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(rx, ry);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawWalls() {
  // Dark walls behind the dance floor with subtle neon accents
  const gy = H * 0.55;

  // Back wall
  const wallGrad = ctx.createLinearGradient(0, H * 0.2, 0, gy);
  wallGrad.addColorStop(0, '#0d0d2e');
  wallGrad.addColorStop(1, '#1a1a3e');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(0, H * 0.2, W, gy - H * 0.2);

  // Neon strips on walls
  const strips = [0.25, 0.45, 0.65];
  strips.forEach((sy, i) => {
    const glow = Math.sin(frameCount * 0.04 + i * 2) * 0.3 + 0.5;
    ctx.globalAlpha = glow;
    ctx.fillStyle = COL.neon[i % COL.neon.length];
    ctx.shadowColor = COL.neon[i % COL.neon.length];
    ctx.shadowBlur = 12 * scale;
    ctx.fillRect(0, H * sy, W, 2 * scale);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  });

  // Speaker stacks on sides
  for (let side = 0; side < 2; side++) {
    const sx = side === 0 ? W * 0.02 : W * 0.88;
    const sw = W * 0.1;
    for (let s = 0; s < 3; s++) {
      const sy = H * 0.3 + s * 28 * scale;
      ctx.fillStyle = '#111111';
      ctx.fillRect(sx, sy, sw, 24 * scale);
      ctx.fillStyle = '#222222';
      ctx.fillRect(sx + 2*scale, sy + 2*scale, sw - 4*scale, 20*scale);
      // Speaker cone
      const pulse = Math.sin(frameCount * 0.1 + s) * 2 * scale;
      ctx.fillStyle = '#333333';
      ctx.beginPath();
      ctx.arc(sx + sw/2, sy + 12*scale, (8 + pulse)*scale, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#444444';
      ctx.beginPath();
      ctx.arc(sx + sw/2, sy + 12*scale, 4*scale, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawGround() {
  const gy = H * 0.55;
  const floorH = H - gy;

  // Dark base
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, gy, W, floorH);

  // Disco floor tiles
  const tw = W / tileCols;
  const th = floorH / tileRows;
  discoTiles.forEach(tile => {
    const tx = tile.c * tw;
    const ty = gy + tile.r * th;

    // Cycle colors over time
    const brightness = Math.sin(frameCount * 0.06 + tile.phase) * 0.4 + 0.4;
    const colorIdx = Math.floor((frameCount * 0.02 + tile.phase) / Math.PI) % COL.neon.length;
    const col = COL.neon[(tile.c + tile.r + colorIdx) % COL.neon.length];

    ctx.globalAlpha = brightness;
    ctx.fillStyle = col;
    ctx.shadowColor = col;
    ctx.shadowBlur = 6 * scale;
    ctx.fillRect(tx + 1, ty + 1, tw - 2, th - 2);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // Tile border
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.strokeRect(tx, ty, tw, th);
  });

  // Glossy reflection overlay
  ctx.globalAlpha = 0.05;
  const reflGrad = ctx.createLinearGradient(0, gy, 0, gy + floorH);
  reflGrad.addColorStop(0, '#ffffff');
  reflGrad.addColorStop(0.5, 'transparent');
  ctx.fillStyle = reflGrad;
  ctx.fillRect(0, gy, W, floorH);
  ctx.globalAlpha = 1;
}

// --- GIRL PIXEL ART ---
function drawGirl() {
  const s = scale * 1.8;
  const p = 3 * s;
  let gx = girl.x * W;
  let gy = girl.y * H;

  const idle = girl.dance === -1;
  const d = girl.dance;
  const f = girl.danceFrame;

  girl.bounceT += 0.05;
  let bounce = idle ? Math.sin(girl.bounceT) * 2 * s : 0;

  let bodyTilt = 0, armLAngle = 0, armRAngle = 0;
  let legSpread = 0, hipShift = 0, headTilt = 0;
  let jumpOffset = 0;

  if (!idle) {
    const t = f / 30;
    switch(d) {
      case 0: // Disco
        hipShift = Math.sin(t * 4) * 6 * s;
        armLAngle = Math.sin(t * 4) * 0.8;
        armRAngle = Math.sin(t * 4 + Math.PI) * 0.8;
        legSpread = Math.abs(Math.sin(t * 2)) * 4 * s;
        headTilt = Math.sin(t * 4) * 0.15;
        break;
      case 1: // Jump
        jumpOffset = -Math.abs(Math.sin(t * 3)) * 20 * s;
        armLAngle = -Math.sin(t * 3) * 1.2;
        armRAngle = -Math.sin(t * 3) * 1.2;
        legSpread = Math.abs(Math.sin(t * 3)) * 6 * s;
        break;
      case 2: // Spin
        hipShift = Math.sin(t * 5) * 10 * s;
        bodyTilt = Math.sin(t * 5) * 0.2;
        armLAngle = t * 3;
        armRAngle = -t * 3;
        break;
      case 3: // Robot
        const snap = Math.floor(t * 4) % 4;
        hipShift = [0, 8*s, 0, -8*s][snap];
        armLAngle = [0, -1, 0.5, -0.5][snap];
        armRAngle = [0.5, 0, -1, 0][snap];
        headTilt = [0, 0.2, 0, -0.2][snap];
        break;
      case 4: // Wave
        armRAngle = Math.sin(t * 6) * 1.5;
        armLAngle = Math.sin(t * 3) * 0.5;
        hipShift = Math.sin(t * 3) * 4 * s;
        legSpread = Math.sin(t * 3) * 3 * s;
        headTilt = Math.sin(t * 2) * 0.1;
        break;
    }
  }

  ctx.save();
  ctx.translate(gx + hipShift, gy + bounce + jumpOffset);
  ctx.rotate(bodyTilt);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(-8*s, 22*p - jumpOffset/2, 16*s, 3*s);

  // Legs
  drawPixelRect(-3*p - legSpread, 12*p, p*2.5, p*6, COL.pants);
  drawPixelRect(-3*p - legSpread, 18*p, p*3, p*2, COL.shoes);
  drawPixelRect(0.5*p + legSpread, 12*p, p*2.5, p*6, COL.pants);
  drawPixelRect(0.5*p + legSpread, 18*p, p*3, p*2, COL.shoes);

  // Body / Jacket (long, reaching knees)
  drawPixelRect(-4*p, -2*p, p*8, p*16, COL.jacket);
  drawPixelRect(-3.5*p, -1*p, p, p*10, COL.jacketHL);
  drawPixelRect(2.5*p, -1*p, p, p*10, COL.jacketHL);
  // Shirt peek
  drawPixelRect(-1*p, -1*p, p*2, p*4, COL.shirt);

  // Left arm
  ctx.save();
  ctx.translate(-4*p, 0);
  ctx.rotate(armLAngle);
  drawPixelRect(-p*2, 0, p*2, p*8, COL.jacket);
  drawPixelRect(-p*2, 8*p, p*2, p*2, COL.skin);
  ctx.restore();

  // Right arm
  ctx.save();
  ctx.translate(4*p, 0);
  ctx.rotate(armRAngle);
  drawPixelRect(0, 0, p*2, p*8, COL.jacket);
  drawPixelRect(0, 8*p, p*2, p*2, COL.skin);
  ctx.restore();

  // Head
  ctx.save();
  ctx.rotate(headTilt);

  // Hair back
  drawPixelRect(-5*p, -11*p, p*10, p*10, COL.hair);
  // Face
  drawPixelRect(-3.5*p, -9*p, p*7, p*7, COL.skin);
  // Hair bangs
  drawPixelRect(-5*p, -11*p, p*10, p*3, COL.hair);
  drawPixelRect(-5*p, -8*p, p*2, p*3, COL.hair);
  drawPixelRect(3*p, -8*p, p*2, p*3, COL.hair);
  // Hair sides (long)
  drawPixelRect(-5*p, -8*p, p*1.5, p*14, COL.hair);
  drawPixelRect(3.5*p, -8*p, p*1.5, p*14, COL.hair);

  // Eyes
  drawPixelRect(-2*p, -6.5*p, p*1.5, p*2, '#ffffff');
  drawPixelRect(0.5*p, -6.5*p, p*1.5, p*2, '#ffffff');
  drawPixelRect(-1.5*p, -6*p, p, p*1.2, '#331100');
  drawPixelRect(1*p, -6*p, p, p*1.2, '#331100');

  // Blush
  ctx.globalAlpha = 0.3;
  drawPixelRect(-3*p, -4.5*p, p*1.5, p, '#ff6688');
  drawPixelRect(1.5*p, -4.5*p, p*1.5, p, '#ff6688');
  ctx.globalAlpha = 1;

  // Mouth
  if (!idle) {
    drawPixelRect(-1*p, -3.5*p, p*2, p*0.8, '#cc4455');
  } else {
    drawPixelRect(-0.5*p, -3.5*p, p, p*0.6, '#cc4455');
  }

  ctx.restore(); // head
  ctx.restore(); // main

  // Dance label
  if (!idle) {
    const danceNames = ['DISCO','JUMP','SPIN','ROBOT','WAVE'];
    ctx.font = `${Math.floor(8*scale)}px 'Press Start 2P', monospace`;
    ctx.fillStyle = COL.neon[d];
    ctx.shadowColor = COL.neon[d];
    ctx.shadowBlur = 8 * scale;
    ctx.textAlign = 'center';
    ctx.fillText(danceNames[d] + '!', gx + hipShift, gy - 50*scale + jumpOffset);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'left';
  }

  // Tap hint
  if (idle && frameCount % 120 < 80) {
    const alpha = Math.sin(frameCount * 0.08) * 0.3 + 0.4;
    ctx.globalAlpha = alpha;
    ctx.font = `${Math.floor(7*scale)}px 'Press Start 2P', monospace`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.fillText('TAP ME!', gx, gy - 48*scale);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

// --- MINION ---
function drawMinion(m, index) {
  const s = scale * 1.3;
  const p = 3 * s;
  const mx = m.x * W;
  const my = m.y * H;

  m.jumpT += 0.06;
  const jump = Math.abs(Math.sin(m.jumpT)) * 12 * s;
  const squash = 1 + Math.sin(m.jumpT) * 0.1;

  ctx.save();
  ctx.translate(mx, my - jump);
  ctx.scale(m.dir, 1);
  ctx.scale(1, 1/squash);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(-4*p, 12*p + jump/2, 8*p, 2*s);

  // Body
  drawPixelRect(-3*p, -4*p, p*6, p*12, COL.minion);
  drawPixelRect(-2*p, -5*p, p*4, p, COL.minion);
  drawPixelRect(-2*p, 8*p, p*4, p, COL.minion);

  // Overalls
  drawPixelRect(-3*p, 4*p, p*6, p*4, COL.minionPants);
  drawPixelRect(-1*p, 2*p, p*2, p*2, COL.minionPants);
  drawPixelRect(-2*p, 2*p, p, p*3, COL.minionPants);
  drawPixelRect(1*p, 2*p, p, p*3, COL.minionPants);

  // Goggle strap
  drawPixelRect(-3.5*p, -2*p, p*7, p, COL.minionGoggles);
  // Goggle
  drawPixelRect(-2*p, -3*p, p*4, p*3, COL.minionGoggles);
  // Eye white
  drawPixelRect(-1.5*p, -2.5*p, p*3, p*2, COL.minionEye);
  // Pupil
  const lookX = Math.sin(frameCount * 0.03 + index) * 0.5;
  drawPixelRect(-0.5*p + lookX*p, -2*p, p*1.2, p*1.2, COL.minionPupil);

  // Mouth
  const mouthOpen = Math.sin(frameCount * 0.1 + index * 2) > 0.3;
  if (mouthOpen) {
    drawPixelRect(-1*p, 1*p, p*2, p, '#333');
    drawPixelRect(-0.5*p, 1*p, p, p*0.5, '#ffffff');
  } else {
    drawPixelRect(-1*p, 1*p, p*2, p*0.5, '#333');
  }

  // Arms (waving)
  const armWave = Math.sin(frameCount * 0.08 + index * 1.5);
  ctx.save();
  ctx.translate(-3*p, 0);
  ctx.rotate(armWave * 0.6 - 0.3);
  drawPixelRect(-p*2, -p, p*2, p*4, COL.minion);
  drawPixelRect(-p*2, 3*p, p*2, p, '#333');
  ctx.restore();

  ctx.save();
  ctx.translate(3*p, 0);
  ctx.rotate(-armWave * 0.6 + 0.3);
  drawPixelRect(0, -p, p*2, p*4, COL.minion);
  drawPixelRect(0, 3*p, p*2, p, '#333');
  ctx.restore();

  // Legs
  const legAnim = Math.sin(frameCount * 0.08 + index);
  drawPixelRect(-2*p + legAnim*p, 8*p, p*2, p*3, COL.minionPants);
  drawPixelRect(0 - legAnim*p, 8*p, p*2, p*3, COL.minionPants);
  drawPixelRect(-2*p + legAnim*p, 11*p, p*2.5, p, '#333');
  drawPixelRect(0 - legAnim*p, 11*p, p*2.5, p, '#333');

  // Hair strands on top
  drawPixelRect(-p*0.5, -5.5*p, p*0.5, p*2, COL.hair);
  drawPixelRect(p*0.3, -6*p, p*0.5, p*2.5, COL.hair);

  ctx.restore();

  // Speech bubble
  const speechIdx = index % speeches.length;
  const showSpeech = Math.sin(frameCount * 0.02 + index * 1.5) > 0.2;
  if (showSpeech) {
    const bx = mx + m.dir * 20 * s;
    const by = my - jump - 35 * s;
    ctx.font = `${Math.floor(5*scale)}px 'Press Start 2P', monospace`;
    const text = speeches[speechIdx];
    const tw = ctx.measureText(text).width;

    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.9;
    const pad = 4*scale;
    ctx.fillRect(bx - tw/2 - pad, by - 8*scale, tw + pad*2, 14*scale);
    ctx.fillRect(bx - 2*scale, by + 6*scale, 4*scale, 4*scale);
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#111111';
    ctx.textAlign = 'center';
    ctx.fillText(text, bx, by + 2*scale);
    ctx.textAlign = 'left';
  }
}

function drawConfetti() {
  confetti.forEach(c => {
    c.x += c.vx;
    c.y += c.vy;
    c.rot += c.rotV;
    if (c.y > 1.1) { c.y = -0.05; c.x = Math.random(); }
    if (c.x < -0.05) c.x = 1.05;
    if (c.x > 1.05) c.x = -0.05;

    ctx.save();
    ctx.translate(c.x * W, c.y * H);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(-c.size/2, -c.size/2, c.size * scale, c.size * scale * 0.6);
    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

// Spotlight beams on the dance floor
function drawSpotlights() {
  const spots = [
    { x: 0.2, color: '#ff00ff' },
    { x: 0.5, color: '#00ffff' },
    { x: 0.8, color: '#ff3366' },
  ];
  spots.forEach((sp, i) => {
    const angle = Math.sin(frameCount * 0.02 + i * 2) * 0.15;
    const sx = sp.x * W + Math.sin(frameCount * 0.015 + i) * W * 0.1;
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = sp.color;
    ctx.beginPath();
    ctx.moveTo(sx - 5*scale, 0);
    ctx.lineTo(sx + 5*scale, 0);
    ctx.lineTo(sx + 80*scale + angle * 200, H);
    ctx.lineTo(sx - 80*scale + angle * 200, H);
    ctx.fill();
    ctx.restore();
  });
}

function drawTitle() {
  titleGlow += 0.03;
  const glowVal = Math.sin(titleGlow) * 0.3 + 0.7;

  const fontSize = Math.floor(22 * scale);
  ctx.font = `${fontSize}px 'Press Start 2P', monospace`;
  ctx.textAlign = 'center';

  const text1 = 'HAPPY';
  const text2 = 'BIRTHDAY';
  const colors = ['#ff3366','#ff9933','#ffff00','#00ff99','#00ffff','#ff00ff','#ff3366','#ff9933'];

  for (let pass = 0; pass < 2; pass++) {
    const text = pass === 0 ? text1 : text2;
    const yOff = pass * fontSize * 1.4;
    const totalW = ctx.measureText(text).width;
    let cx = W/2 - totalW/2;

    for (let i = 0; i < text.length; i++) {
      const ci = (i + Math.floor(frameCount/10)) % colors.length;
      ctx.fillStyle = colors[ci];
      ctx.shadowColor = colors[ci];
      ctx.shadowBlur = 12 * scale * glowVal;
      const charW = ctx.measureText(text[i]).width;
      const charBounce = Math.sin(frameCount * 0.08 + i * 0.5) * 4 * scale;
      ctx.fillText(text[i], cx + charW/2, H * 0.07 + yOff + charBounce);
      cx += charW;
    }
  }

  // Name
  const nameSize = Math.floor(26 * scale);
  ctx.font = `${nameSize}px 'Press Start 2P', monospace`;
  const nameBounce = Math.sin(frameCount * 0.04) * 4 * scale;
  ctx.fillStyle = '#ffff00';
  ctx.shadowColor = '#ffff00';
  ctx.shadowBlur = 18 * scale * glowVal;
  ctx.fillText('LIODA!', W/2, H * 0.07 + fontSize * 3 + nameBounce);

  // Subtitle
  const subSize = Math.floor(10 * scale);
  ctx.font = `${subSize}px 'Press Start 2P', monospace`;
  const subBounce = Math.sin(frameCount * 0.06) * 2 * scale;
  const subGlow = Math.sin(frameCount * 0.05) * 0.3 + 0.7;
  ctx.fillStyle = '#ff00ff';
  ctx.shadowColor = '#ff00ff';
  ctx.shadowBlur = 10 * scale * subGlow;
  ctx.fillText("DANCE IT'S YOUR BIRTHDAY", W/2, H * 0.07 + fontSize * 3 + nameSize * 1.2 + nameBounce + subBounce);

  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';
}


// --- MAIN LOOP ---
function update() {
  if (girl.dance >= 0) {
    girl.danceTimer++;
    girl.danceFrame++;
    if (girl.danceTimer >= girl.danceDuration) {
      girl.dance = -1;
      girl.danceTimer = 0;
      girl.danceFrame = 0;
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawStars();
  drawWalls();
  drawDiscoBall();
  drawGround();
  drawSpotlights();

  drawMinion(minions[0], 0);
  drawMinion(minions[1], 1);
  drawGirl();
  drawMinion(minions[2], 2);
  drawMinion(minions[3], 3);

  drawConfetti();
  drawTitle();
}

function loop() {
  frameCount++;
  update();
  draw();
  requestAnimationFrame(loop);
}

document.fonts.ready.then(() => loop());
</script>
</body>
